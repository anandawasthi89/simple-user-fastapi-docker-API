version: '3.9'

services:
  app:
    build: .
    container_name: fastapi_CRUD_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app  # for live reload (dev only)
      - ./data:/data  # Maps local folder to the container path
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
